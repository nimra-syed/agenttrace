services:
  postgres:
    image: postgres:16-alpine
    container_name: agenttrace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agenttrace
      POSTGRES_PASSWORD: agenttrace_dev_password
      POSTGRES_DB: agenttrace
    ports:
      - "5433:5432"
    volumes:
      - agenttrace_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenttrace"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  agenttrace_postgres_data:
